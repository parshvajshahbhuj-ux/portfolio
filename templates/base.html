<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="{% block meta_description %}Parshva Shah — Full Stack Developer & AI Enthusiast{% endblock %}" />
  <meta name="author" content="Parshva Shah" />
  <meta property="og:title" content="{% block og_title %}Parshva Shah{% endblock %}" />
  <meta property="og:description" content="Building Smart Systems with Code & Creativity" />
  <meta property="og:type" content="website" />
  <title>{% block title %}Parshva Shah{% endblock %}</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  {% load static %}
  <link rel="stylesheet" href="{% static 'css/main.css' %}" />
  {% block extra_css %}{% endblock %}
</head>
<body>
  <!-- Scroll Progress Bar -->
  <div id="scroll-progress" aria-hidden="true"></div>

  <!-- Page Loader -->
  <div id="page-loader" aria-hidden="true">
    <div class="loader-inner">
      <span class="loader-dot"></span>
      <span class="loader-dot"></span>
      <span class="loader-dot"></span>
    </div>
  </div>

  {% include "components/navbar.html" %}

  <main id="main-content">
    {% if messages %}
      <div class="messages-container" role="alert" aria-live="polite">
        {% for message in messages %}
          <div class="alert alert--{{ message.tags }}">
            <span>{{ message }}</span>
            <button class="alert-close" aria-label="Close">&times;</button>
          </div>
        {% endfor %}
      </div>
    {% endif %}

    {% block content %}{% endblock %}
  </main>

  {% include "components/footer.html" %}

  <!-- Back to Top Button -->
  <button id="back-to-top" class="back-to-top" aria-label="Back to top" title="Back to top" hidden>
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><polyline points="18 15 12 9 6 15"/></svg>
  </button>

  <script src="{% static 'js/main.js' %}"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
